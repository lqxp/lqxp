<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">QxProtocol Messenger</title>
  <desc id="desc">Realtime rooms for private chat, voice, reactions, link previews, and lightweight backups.</desc>
  <defs>
    <linearGradient id="bg" x1="60" y1="28" x2="1080" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101216"/>
      <stop offset=".46" stop-color="#182531"/>
      <stop offset="1" stop-color="#07101a"/>
    </linearGradient>
    <linearGradient id="accent" x1="640" y1="92" x2="1046" y2="494" gradientUnits="userSpaceOnUse">
      <stop stop-color="#36c7c0"/>
      <stop offset="1" stop-color="#2090ea"/>
    </linearGradient>
    <linearGradient id="bubble" x1="720" y1="228" x2="1040" y2="382" gradientUnits="userSpaceOnUse">
      <stop stop-color="#35bff8"/>
      <stop offset="1" stop-color="#1f7ed1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="32" stdDeviation="38" flood-color="#000713" flood-opacity=".48"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="990" cy="116" r="220" fill="#2090ea" opacity=".20" filter="url(#glow)"/>
  <circle cx="172" cy="540" r="190" fill="#36c7c0" opacity=".13" filter="url(#glow)"/>
  <path d="M0 484C150 420 280 424 420 488c154 70 319 77 477 13 118-48 207-105 303-94v223H0V484Z" fill="#07101a" opacity=".72"/>


  <text x="92" y="218" fill="#f7f8fb" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="78" font-weight="850" letter-spacing="-.05em">QxProtocol</text>
  <text x="92" y="300" fill="#f7f8fb" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="78" font-weight="850" letter-spacing="-.05em">Messenger</text>
  <text x="96" y="368" fill="#b7c2d0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" letter-spacing="-.02em">Realtime rooms for private chat,</text>
  <text x="96" y="410" fill="#b7c2d0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" letter-spacing="-.02em">voice, reactions, and previews.</text>

  <g transform="translate(96 472)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="0" width="132" height="42" rx="21" fill="#2090ea" fill-opacity=".18" stroke="#2090ea" stroke-opacity=".36"/>
    <text x="25" y="28" fill="#dff2ff" font-size="17" font-weight="700">Chat</text>
    <rect x="148" y="0" width="132" height="42" rx="21" fill="#36c7c0" fill-opacity=".14" stroke="#36c7c0" stroke-opacity=".34"/>
    <text x="173" y="28" fill="#e2fffb" font-size="17" font-weight="700">Voice</text>
    <rect x="296" y="0" width="166" height="42" rx="21" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".12"/>
    <text x="321" y="28" fill="#eef2f7" font-size="17" font-weight="700">Link previews</text>
  </g>

  <g transform="translate(584 86)" filter="url(#shadow)">
