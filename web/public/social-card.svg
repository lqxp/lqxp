    <rect x="32" y="34" width="170" height="390" rx="30" fill="#292e36" stroke="#ffffff" stroke-opacity=".06"/>
    <circle cx="72" cy="82" r="18" fill="#3fcf6f"/>
    <rect x="104" y="68" width="66" height="11" rx="5.5" fill="#f4f4f5" opacity=".82"/>
    <rect x="104" y="91" width="46" height="8" rx="4" fill="#8a8a90"/>

    <rect x="58" y="144" width="118" height="48" rx="17" fill="#343a43"/>
    <rect x="58" y="216" width="104" height="48" rx="17" fill="#343a43"/>
    <rect x="58" y="288" width="126" height="48" rx="17" fill="#1f3345" stroke="#2090ea" stroke-opacity=".26"/>
    <circle cx="82" cy="168" r="10" fill="#3b8bff"/>
    <circle cx="82" cy="240" r="10" fill="#f0a63a"/>
    <circle cx="82" cy="312" r="10" fill="#36c7c0"/>
    <rect x="101" y="160" width="54" height="9" rx="4.5" fill="#f4f4f5" opacity=".72"/>
    <rect x="101" y="232" width="44" height="9" rx="4.5" fill="#f4f4f5" opacity=".64"/>
    <rect x="101" y="304" width="62" height="9" rx="4.5" fill="#f4f4f5" opacity=".82"/>

    <rect x="232" y="34" width="260" height="390" rx="30" fill="#171b21" stroke="#ffffff" stroke-opacity=".06"/>
    <rect x="264" y="78" width="148" height="40" rx="20" fill="#303741"/>
    <rect x="286" y="93" width="95" height="9" rx="4.5" fill="#dbe4ee" opacity=".72"/>
    <rect x="282" y="154" width="176" height="72" rx="25" fill="url(#bubble)"/>
    <rect x="306" y="179" width="118" height="10" rx="5" fill="#ffffff" opacity=".9"/>
    <rect x="306" y="201" width="86" height="8" rx="4" fill="#ffffff" opacity=".6"/>
    <rect x="264" y="256" width="164" height="68" rx="24" fill="#343a43"/>
    <rect x="290" y="282" width="96" height="9" rx="4.5" fill="#f4f4f5" opacity=".72"/>
    <rect x="290" y="303" width="112" height="8" rx="4" fill="#8a8a90" opacity=".74"/>
    <rect x="334" y="352" width="118" height="36" rx="18" fill="#232832" stroke="#ffffff" stroke-opacity=".08"/>
    <circle cx="360" cy="370" r="8" fill="#3fcf6f"/>
    <rect x="378" y="365" width="48" height="9" rx="4.5" fill="#f4f4f5" opacity=".68"/>
  </g>

  <text x="96" y="584" fill="#8a8a90" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="21" letter-spacing=".13em">WEBSOCKET-FIRST SECURE ROOMS</text>
