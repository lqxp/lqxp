# Coturn example for QxProtocol relay-only calls.
# Adjust hostnames, paths, and credentials for your deployment.

use-auth-secret=0
lt-cred-mech

realm=turn.qxp.example.com
server-name=turn.qxp.example.com

user=qxp-turn:change-me

listening-port=3478
tls-listening-port=5349

fingerprint
no-cli
no-multicast-peers
no-loopback-peers

cert=/etc/letsencrypt/live/turn.qxp.example.com/fullchain.pem
pkey=/etc/letsencrypt/live/turn.qxp.example.com/privkey.pem

# Open these in your firewall / security groups:
# - TCP 3478
# - UDP 3478
# - TCP 5349
# - UDP 49152-65535

min-port=49152
max-port=65535
