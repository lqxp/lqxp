[api]

domain = ""
publicDomain = "qxp.example.com"
port = 4560
adminPassword = ""

[network]

heartbeatInterval = 3000
maxConnectionsPerIp = 3
latestVersion = ""
publicDir = "web/dist"
webchatIndex = "index.html"

[rtc]

relayOnly = true
turnUrls = [
  "turn:turn.qxp.example.com:3478?transport=udp",
  "turns:turn.qxp.example.com:5349?transport=tcp",
]
turnUsername = "qxp-turn"
turnCredential = "change-me"

[database]

# kind can be "sqlite" or "postgresql".
kind = "sqlite"
url = "sqlite://files/qxp.sqlite"

[security]

# Snowflake-like account IDs with administrator access.
adminIds = []
registerEnabled = true
